<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me - Akash Shingare | Web Developer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<section class="contact-section">

  <div class="contact-card">

    <!-- LEFT -->
    <div class="contact-info">
      <h1>Let's Build Something Amazing 🚀</h1>
      <p>Tell me about your project and I’ll get back to you quickly.</p>

      <div class="info-box">
        <span>📧</span> admin@akwebify.com
      </div>
      <div class="info-box">
        <span>🌍</span> www.akwebify.vercel.app
      </div>
    </div>

    <!-- RIGHT -->
    <form>

      <h2>Contact Form</h2>

      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <textarea id="message" placeholder="Describe your project..." required></textarea>

      <button type="submit">
        🚀 Send Message
      </button>

    </form>

  </div>

</section>

<script src="js/form-handler.js"></script>

</body>
</html>
